version: 1.3.0

endpoints:
  custom:
    - name: "Ollama"
      apiKey: "ollama"  # label only; Ollama doesn't need it
      baseURL: "http://host.docker.internal:11434/v1/"
      models:
        default:
          - "llava:latest"
        fetch: true
      titleConvo: true
      titleModel: "llava:latest"
      summarize: false
      summaryModel: "llava:latest"
      forcePrompt: false
      modelDisplayLabel: "Ollama"
      order: 10

mcpServers:
  # File system access
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /path/to/your/documents

  # Web browser automation
  puppeteer:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-puppeteer"

  # Production-ready cloud service
  business-api:
    type: streamable-http
    url: https://api.yourbusiness.com/mcp
    headers:
      X-User-ID: "{{LIBRECHAT_USER_ID}}"
      Authorization: "Bearer ${API_TOKEN}"
    timeout: 30000
    serverInstructions: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  multiConvo: true
  agents: true
  marketplace:
    use: true
